name: Build & Push Tauri Runner Image

on:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile.tauri'
      - '.github/workflows/build-runner-tauri.yml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Tauri runner image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.tauri
          push: true
          tags: ghcr.io/bobdivx/popcorn-github-runner-server:latest

